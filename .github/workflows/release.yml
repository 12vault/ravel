name: Release binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, runner: ubuntu-latest }
          - { os: linux, arch: arm64, runner: ubuntu-latest }
          - { os: darwin, arch: amd64, runner: macos-latest }
          - { os: darwin, arch: arm64, runner: macos-latest }
          - { os: windows, arch: amd64, runner: windows-latest }
          - { os: windows, arch: arm64, runner: windows-latest }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build Unix archive
        if: matrix.os != 'windows'
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -buildvcs=false -trimpath -ldflags "-s -w -X github.com/12ya/reporavel/internal/cli.Version=${GITHUB_REF_NAME}" -o ravel ./cmd/ravel
          tar -czf "ravel_${GOOS}_${GOARCH}.tar.gz" ravel LICENSE
      - name: Check Apple signing configuration
        if: matrix.os == 'darwin'
        id: apple-signing
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if test -n "$MACOS_CERTIFICATE_P12" && \
             test -n "$MACOS_CERTIFICATE_PASSWORD" && \
             test -n "$MACOS_SIGNING_IDENTITY" && \
             test -n "$APPLE_ID" && \
             test -n "$APPLE_APP_PASSWORD" && \
             test -n "$APPLE_TEAM_ID"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets are incomplete; publishing an ad-hoc signed macOS binary"
          fi
      - name: Import Apple Developer ID certificate
        if: matrix.os == 'darwin' && steps.apple-signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$MACOS_CERTIFICATE_P12"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          KEYCHAIN_PATH="$RUNNER_TEMP/ravel-signing.keychain-db"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/ravel-signing.p12"
          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/ravel-signing.p12" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k runner "$KEYCHAIN_PATH"
      - name: Sign and notarize macOS binary
        if: matrix.os == 'darwin' && steps.apple-signing.outputs.enabled == 'true'
        shell: bash
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$MACOS_SIGNING_IDENTITY"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          codesign --force --options runtime --timestamp --sign "$MACOS_SIGNING_IDENTITY" ravel
          codesign --verify --strict --verbose=2 ravel
          ditto -c -k --keepParent ravel "$RUNNER_TEMP/ravel-notarization.zip"
          xcrun notarytool submit "$RUNNER_TEMP/ravel-notarization.zip" --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          spctl --assess --type execute --verbose=4 ravel
          tar -czf "ravel_${GOOS}_${GOARCH}.tar.gz" ravel LICENSE
      - name: Ad-hoc sign macOS binary
        if: matrix.os == 'darwin' && steps.apple-signing.outputs.enabled != 'true'
        shell: bash
        run: |
          codesign --force --sign - ravel
          codesign --verify --strict --verbose=2 ravel
          tar -czf "ravel_${GOOS}_${GOARCH}.tar.gz" ravel LICENSE
      - name: Build Windows archive
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -buildvcs=false -trimpath -ldflags "-s -w -X github.com/12ya/reporavel/internal/cli.Version=$env:GITHUB_REF_NAME" -o ravel.exe ./cmd/ravel
          Compress-Archive -Path ravel.exe,LICENSE -DestinationPath "ravel_windows_$env:GOARCH.zip"
      - uses: actions/upload-artifact@v6
        with:
          name: ravel-${{ matrix.os }}-${{ matrix.arch }}
          path: ravel_*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: ravel-*
          merge-multiple: true
      - name: Create checksums
        run: sha256sum ravel_* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ravel_*
            checksums.txt
