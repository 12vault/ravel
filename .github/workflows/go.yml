name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Static security analysis
        uses: securego/gosec@v2
        with:
          args: -severity high -exclude-dir=testdata ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Test
        run: go test -race ./...

      - name: Test native assistant integrations
        run: go test ./internal/install -run TestNativeProjectIntegrationsAreIdempotentAndReversible

      - name: Compile benchmark suite
        run: go test -run '^$' -bench '^$' ./internal/build ./internal/query

      - name: Verify release versions
        run: python3 scripts/test_release.py

      - name: Build
        run: go build ./...

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
