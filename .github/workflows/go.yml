name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code

      - name: Vet
        run: go vet ./...

      - name: Static security analysis
        uses: securego/gosec@v2
        with:
          args: -severity high -exclude-dir=testdata ./...

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Test
        run: go test -race ./...

      - name: Test native assistant integrations
        run: go test ./internal/install -run TestNativeProjectIntegrationsAreIdempotentAndReversible

      - name: Compile benchmark suite
        run: go test -run '^$' -bench '^$' ./internal/build ./internal/query

      - name: Validate retrieval quality corpus
        run: python3 benchmarks/run_external_quality.py --check

      - name: Gate self-repository retrieval quality
        run: |
          go build -o "$RUNNER_TEMP/ravel" ./cmd/ravel
          "$RUNNER_TEMP/ravel" build --out "$RUNNER_TEMP/ravel-self-graph" .
          "$RUNNER_TEMP/ravel" benchmark \
            --graph "$RUNNER_TEMP/ravel-self-graph" \
            --dataset benchmarks/ravel-retrieval.jsonl \
            --gate benchmarks/self-quality-gate.json \
            --retriever context \
            --top-k 25 \
            --token-budget 800 \
            --dataset-revision ravel-repository-v2 \
            --graph-revision "$GITHUB_SHA" \
            --out "$RUNNER_TEMP/ravel-self-quality.json"

      - name: Verify release versions
        run: python3 scripts/test_release.py

      - name: Build
        run: go build ./...

  external-retrieval-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Ravel
        run: go build -o "$RUNNER_TEMP/ravel" ./cmd/ravel

      - name: Gate pinned external retrieval quality
        run: |
          python3 benchmarks/run_external_quality.py \
            --ravel "$RUNNER_TEMP/ravel" \
            --workspace "$RUNNER_TEMP/ravel-external-quality"

      - name: Upload retrieval reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: external-retrieval-quality
          path: ${{ runner.temp }}/ravel-external-quality/results/*.json
          if-no-files-found: warn

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
